<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SafeLiinkBot</title>
    <link rel="stylesheet" href="/web/app.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="scan-panel" aria-labelledby="app-title">
        <header class="panel-header">
          <p class="eyebrow">SafeLiinkBot</p>
          <h1 id="app-title">فحص رابط</h1>
          <p class="intro">افحص الرابط قبل فتحه وتحقق من مؤشرات الخطر الأساسية.</p>
        </header>

        <form id="scan-form" class="scan-form">
          <label for="url-input">الرابط أو الرسالة</label>
          <div class="input-row">
            <div class="textarea-wrap">
              <textarea
                id="url-input"
                name="url"
                inputmode="text"
                autocomplete="off"
                placeholder="الصق الرابط أو الرسالة التي تحتوي على رابط"
                rows="3"
                required
              ></textarea>
              <div class="textarea-actions" aria-label="أدوات الإدخال">
                <button id="clear-input" class="input-tool-button" type="button" aria-label="مسح النص" hidden>×</button>
                <button id="paste-input" class="input-tool-button paste-button" type="button" aria-label="لصق من الحافظة" hidden>لصق</button>
              </div>
            </div>
            <button id="scan-button" type="submit">فحص</button>
          </div>
          <p class="privacy-note">الفحص مبدئي وليس ضمانًا</p>
        </form>

        <section id="status" class="status" aria-live="polite" aria-atomic="true"></section>
        <section id="result" class="result" hidden></section>
      </section>
    </main>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/web/app.js"></script>
  </body>
</html>
